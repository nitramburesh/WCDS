name: Publish to npm

# 👇🏽 Reakce pouze na tagy, které začínají 'v' následované verzí, např. 'v1.0.0'
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 👇🏽 Nastavení oprávnění pro workflow
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest

    steps:
      # 👇🏽 Příprava kódu pro CI/CD prostředí
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # 👇🏽 Nastavení pnpm pro správu balíčků
      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      # 👇🏽 Nastavení Node.js a konfigurace pro publikování na npm
      - name: Setup Node + pnpm
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # 👇🏽 Instalace závislostí s pevnou verzí z lockfile
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 👇🏽 Ověření, že verze v tagu odpovídá verzi v package.json
      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"

          if [[ "$TAG_VERSION" != "$PKG_VERSION" ]]; then
            echo "Tag version v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      # 👇🏽 Publikování balíčku na npm
      - name: Publish to npm
        run: pnpm publish --access public --provenance --no-git-checks
