name: 'Chromatic'

# 👇🏽 Reaguje na každý push do hlavní větve
on:
  push:
    branches:
      - 'main'
  workflow_dispatch:
'

jobs:
  chromatic:
    name: Run Chromatic
    runs-on: ubuntu-latest
    steps:
      # 👇🏽 Přístup k repozitáři a nastavení prostředí
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # 👇🏽 Nastavení pnpm pro správu balíčků
      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      # 👇🏽 Nastavení Node.js pro běh Chromatic
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: pnpm

      # 👇🏽 Instalace závislostí s pevnou verzí z lockfile
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 👇🏽 Spuštění Chromatic pro vizuální testování komponent
      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitOnceUploaded: true
